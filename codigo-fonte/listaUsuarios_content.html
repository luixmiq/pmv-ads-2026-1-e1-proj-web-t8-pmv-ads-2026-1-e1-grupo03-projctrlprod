<div class="lista-wrapper">
    <header>
        <h2>👥 Usuários Cadastrados</h2>
        <p>Visualize e gerencie as contas do sistema</p>
    </header>

    <div class="table-container">
        <table class="custom-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuário</th>
                    <th>Categoria</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <!-- Os dados vão aparecer aqui via JS -->
            </tbody>
        </table>
    </div>
    
<dialog id="meuPopup">
    <header>
          <h2>Alterar dados do usuário: <span id="user">...</span></h2>
          <p>Preencha os dados abaixo para alterar os dados no sistema</p>
        </header>

        <div class="input-group">
          <label>Novo nome ou nova matrícula</label>
          <input type="text" id="username" placeholder="Ex: 102030">
        </div>

        <div class="input-group">
          <label for="usuarioCat">Categoria do Usuário</label>
          <select id="usuarioCat" name="usuarioCat" class="custom-select">
            <option value="" disabled selected>Selecione uma categoria...</option>
            <option value="Manufatura">🛠️ Manufatura</option>
            <option value="Administrador">🔑 Administrador</option>
          </select>
        </div>

        <div class="input-group">
          <label>Nova senha</label>
          <input type="password" id="pwd1" placeholder="••••">
        </div>

        <div class="input-group">
          <label>Confirmar nova senha</label>
          <input type="password" id="pwd2" placeholder="••••">
        </div>

        <button type="button" id="BtnCadastrar" onclick="salvarAlteracoes()">Modificar Usuário</button>

        <footer class="form-footer">
          <p>© 2026 UsinagensPro V1.0</p>
        </footer>
</dialog>

</div>
