<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<form class="login-form">

  <div>
    <h2>Seja bem vindo</h2>
    <h3>Faça seu login para acessar a tela principal</h3>
  </div>

  <div>
    <label for="username">Nome ou mátricula do usuário:</label><br>
    <input type="text" id="username" name="username"><br>
  </div>

  <div>
    <label for="pwd">Digite sua senha:</label><br>
    <input type="password" id="pwd" name="pwd">
  </div>

  <div>
    <button id="BtnLogin" name="button">🔐 Entrar</button>
  </div>

  <div class="footer-copyright">
    <p>&copy; 2026 UsinagensPro V1.0. Todos os direitos reservados.</p>
  </div>

</form>
    <script src="script.js"></script>
</body>
</html>
