<div class="cadastro-wrapper">
    <form class="cadastro-form">
        <header>
          <h2>➕ Novo pedido</h2>
          <p>Preencha os dados abaixo para cadastrar no sistema</p>
        </header>

        <div class="input-group">
          <label>Nome do produto a ser fabricado</label>
          <input type="text" id="nomeProduto" placeholder="Ex: Flange 30mm" required>
        </div>

        <div class="input-group">
          <label>Número do pedido a ser fabricado</label>
          <input type="text" id="numeroPedido" placeholder="Ex: 0001" required>
        </div>

        <div class="input-group">
          <label for="CatMaterial">Material</label>
          <select id="CatMaterial" name="CatMaterial" class="custom-select">
            <option value="" disabled selected>Selecione um material...</option>
            <option value="SAE 1020">SAE 1020</option>
            <option value="SAE 1045">SAE 1045</option>
            <option value="A36">A36</option>
            <option value="AISI 304">AISI 304</option>
            <option value="AISI 316">AISI 316</option>
            <option value="AISI 430">AISI 430</option>
            <option value="AISI 420">AISI 420</option>
            <option value="AISI 201">AISI 201</option>
          </select>
        </div>

        <div class="input-group">
          <label>Valor total de fabricação da peça (R$)</label>
          <input type="text" id="valorTotal" placeholder="Ex: 50,00" required>
        </div>

        <div class="input-group">
          <label for="tempoFabricacao">Valor extimado de tempo para fabricação da peça (Minutos)</label>
          <input type="text" id="tempoFabricacao" placeholder="Ex: 15" required>
        </div>

        <div class="input-group">
          <label for="CatUrgencia">Nível de urgência de fabricação</label>
          <select id="CatUrgencia" name="CatUrgencia" class="custom-select">
            <option value="" disabled selected>Selecione o nível de urgência de fabricação...</option>
            <option value="Normal">Normal</option>
            <option value="Média">Média</option>
            <option value="Alta">Alta</option>
            <option value="Critica">Critica</option>
          </select>
        </div>

        <div class="input-group">
          <label for="CatMaq">Identificação de máquina</label>
          <select id="CatMaq" name="CatMaq" class="custom-select">
          </select>
        </div>


        <button type="button" id="BtnCadastrar" onclick="CadastrarPedido()">Cadastrar</button>

        <footer class="form-footer">
          <p>© 2026 UsinagensPro V1.0</p>
        </footer>
    </form>
</div>
