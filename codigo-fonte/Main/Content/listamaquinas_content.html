<div class="lista-wrapper">
    <header>
        <h2>⚙️ Máquinas cadastradas</h2>
        <p>Visualize e gerencie as máquinas da produção</p>
    </header>

    <div class="table-container">
        <table class="custom-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Marca</th>
                    <th>Categoria</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <!-- Os dados vão aparecer aqui via JS -->
            </tbody>
        </table>
    </div>

  <div>
    <button id="BtnAtualizar" name="button" onclick="listarMaquinas()">Atualizar tabela</button>
  </div>

<dialog id="meuPopupMaq">
    <header>
          <h2>Alterar dados do equipamento: <span id="user">...</span></h2>
          <p>Preencha os dados abaixo para alterar os dados no sistema</p>
        </header>

        <div class="input-group">
          <label>Novo nome da marca</label>
          <input type="text" id="name" placeholder="Ex: Mazak">
        </div>

        <div class="input-group">
          <label for="maquinaCat">Categoria das máquinas</label>
          <select id="maquinaCat" name="maquinaCat" class="custom-select">
            <option value="" disabled selected>Selecione uma categoria...</option>
            <option value="Fresa_Manual">🛠️ Fresa - Manual</option>
            <option value="Fresa_CNC">🛠️ Fresa - CNC</option>
            <option value="Torno_Manual">🛠️ Torno - Manual</option>
            <option value="Torno-CNC">🛠️ Torno - CNC</option>
          </select>
        </div>

        <button type="button" id="BtnCadastrar" onclick="salvarAlteracoesMaq()">Modificar dados</button>

        <footer class="form-footer">
          <p>© 2026 UsinagensPro V1.0</p>
        </footer>
</dialog>

</div>
